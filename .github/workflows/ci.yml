name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --group dev
      - name: ruff check
        run: uv run ruff check lore/ apps/ tests/
      - name: ruff format check
        run: uv run ruff format --check lore/ apps/ tests/
      - name: mypy
        run: uv run mypy lore/ apps/

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run unit tests
        run: uv run pytest tests/unit/ -m unit -q
        env:
          DATABASE_URL: postgresql+asyncpg://user:pass@localhost/lore
          OPENAI_API_KEY: sk-fake
